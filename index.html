<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
        name="description"
        content="Galeri portofolio video YouTube yang menampilkan koleksi karya dalam tampilan responsif."
    />

    <title>Galeri Portofolio YouTube</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="index.css" />
</head>
<body>

    <!-- Main Application -->
    <main class="app">

        <!-- Header -->
        <header class="app-header">
            <div class="container">
                <h1 class="app-title">Galeri Portofolio YouTube</h1>
            </div>
        </header>

        <!-- Main Content -->
        <section class="gallery-section" aria-labelledby="gallery-title">

            <div class="container">

                <h2 id="gallery-title" class="visually-hidden">
                    Daftar Video
                </h2>

                <!-- Loading State -->
                <div
                    id="loading-state"
                    class="state state-loading"
                    role="status"
                    aria-live="polite"
                >
                    <p>Sedang memuat video...</p>
                </div>

                <!-- Error State -->
                <div
                    id="error-state"
                    class="state state-error"
                    role="alert"
                    hidden
                >
                    <p>Maaf, data video gagal dimuat. Silakan coba lagi.</p>
                </div>

                <!-- Video Grid -->
                <section
                    id="video-grid"
                    class="video-grid"
                    aria-label="Galeri Video"
                >
                    <!--
                        Kartu video akan dirender secara dinamis
                        menggunakan JavaScript.
                    -->
                </section>

            </div>

        </section>

    </main>

    <!-- External JavaScript -->
    <script src="index.js" defer></script>

</body>
</html>
