<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galeri portofolio video YouTube interaktif.">
    <title>Galeri Portofolio Video</title>
    
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <main class="app-container">
        
        <header class="gallery-header">
            <h1 id="gallery-title">Portofolio Video</h1>
        </header>

        <section class="gallery-content" aria-labelledby="gallery-title">
            
            <div id="loading-state" class="ui-state" aria-live="polite">
                <p>Sedang mengambil data video...</p>
            </div>

            <div id="error-state" class="ui-state" hidden aria-live="assertive">
                <p>Gagal memuat galeri. Silakan periksa koneksi Anda dan coba lagi.</p>
                <button type="button" id="retry-btn">Coba Lagi</button>
            </div>

            <!-- Kategori Pembagian Video -->
            <div id="gallery-sections" hidden>
                <div class="category-section">
                    <h2 class="category-badge badge-video">▶️ Regular Videos</h2>
                    <div id="video-grid" class="video-grid-container"></div>
                </div>

                <div class="category-section">
                    <h2 class="category-badge badge-shorts">📱 YouTube Shorts</h2>
                    <!-- Menggunakan grid khusus untuk shorts agar rasionya pas -->
                    <div id="shorts-grid" class="video-grid-container shorts-grid-container"></div>
                </div>

                <div class="category-section">
                    <h2 class="category-badge badge-live">🔴 Live Streams</h2>
                    <div id="live-grid" class="video-grid-container"></div>
                </div>
            </div>

        </section>

    </main>

    <script src="index.js" defer></script>
</body>
</html>
